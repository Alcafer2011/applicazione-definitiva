<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#00f2ff">
    <meta name="description" content="AI Enterprise OS - Unified Theme System">
    <title>AI Enterprise OS</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Theme CSS -->
    <link rel="stylesheet" href="/css/theme.css">
    <style>
        /* Application-specific overrides */
        :root {
            --max-content-width: 1400px;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .app-container {
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
            grid-template-rows: var(--topbar-height) 1fr;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .main-content {
            grid-column: 2;
            grid-row: 2;
            overflow-y: auto;
            padding: var(--spacing-2xl);
        }

        .page-title {
            font-family: var(--font-tech);
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--neon-cyan);
            text-shadow: var(--shadow-text);
            margin-bottom: var(--spacing-xl);
            text-transform: uppercase;
        }

        /* Layout utilities */
        .flex-container {
            display: flex;
            gap: var(--spacing-lg);
            flex-wrap: wrap;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: var(--spacing-lg);
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: var(--spacing-lg);
        }

        .card-group {
            display: grid;
            gap: var(--spacing-lg);
        }

        /* Status indicators */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-active {
            background: rgba(0, 255, 65, 0.1);
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
        }

        .status-inactive {
            background: rgba(255, 0, 234, 0.1);
            color: var(--neon-pink);
            border: 1px solid var(--neon-pink);
        }

        .status-warning {
            background: rgba(255, 136, 0, 0.1);
            color: var(--neon-orange);
            border: 1px solid var(--neon-orange);
        }

        /* Service cards */
        .service-card {
            background: var(--bg-crystal);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border-crystal);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            transition: all var(--transition-normal);
            cursor: pointer;
        }

        .service-card:hover {
            transform: translateY(-4px);
            border-color: var(--border-neon);
            box-shadow: var(--shadow-neon);
            background: rgba(0, 242, 255, 0.05);
        }

        .service-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--spacing-lg);
        }

        .service-card-title {
            font-family: var(--font-tech);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--neon-cyan);
            letter-spacing: 1px;
        }

        .service-card-description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: var(--spacing-md);
        }

        .service-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: var(--spacing-md);
            border-top: 1px solid var(--border-crystal);
        }

        /* Data table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-crystal);
            border: 1px solid var(--border-crystal);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .data-table thead {
            background: rgba(0, 242, 255, 0.05);
            border-bottom: 2px solid var(--border-crystal);
        }

        .data-table th {
            padding: var(--spacing-md) var(--spacing-lg);
            text-align: left;
            font-family: var(--font-tech);
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .data-table td {
            padding: var(--spacing-md) var(--spacing-lg);
            border-bottom: 1px solid var(--border-crystal);
            color: var(--text-secondary);
        }

        .data-table tbody tr:hover {
            background: rgba(0, 242, 255, 0.05);
        }

        .data-table tbody tr:last-child td {
            border-bottom: none;
        }

        /* Loading animation */
        @keyframes shimmer {
            0% {
                background-position: -1000px 0;
            }
            100% {
                background-position: 1000px 0;
            }
        }

        .loading-skeleton {
            background: linear-gradient(
                90deg,
                var(--bg-glass-heavy) 25%,
                rgba(0, 242, 255, 0.1) 50%,
                var(--bg-glass-heavy) 75%
            );
            background-size: 1000px 100%;
            animation: shimmer 2s infinite;
            border-radius: var(--radius-md);
            height: 20px;
            margin: var(--spacing-md) 0;
        }

        /* Responsive adjustments */
        @media (max-width: 1024px) {
            .grid-3 {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .app-container {
                grid-template-columns: 1fr;
                grid-template-rows: var(--topbar-height) 1fr;
            }

            .main-content {
                grid-column: 1;
                padding: var(--spacing-lg);
            }

            .grid-2,
            .grid-3 {
                grid-template-columns: 1fr;
            }

            .page-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    ◆ BOS
                </div>
            </div>
            <nav id="navigation"></nav>
        </aside>

        <!-- Topbar -->
        <header class="topbar" id="topbar">
            <div class="topbar-title">AI ENTERPRISE OS</div>
            <div class="topbar-telemetry">
                <div><span>UPTIME:</span> <span id="uptime">--:--:--</span></div>
                <div><span>CPU:</span> <span id="cpu">--% </span></div>
                <div><span>MEM:</span> <span id="memory">--% </span></div>
                <div><span>SERVICES:</span> <span id="services-count">33</span></div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="content main-content" id="main-content">
            <h1 class="page-title">Dashboard</h1>
            
            <section class="card-group">
                <h2 style="font-family: var(--font-tech); font-size: 1.2rem; color: var(--neon-cyan); text-transform: uppercase; letter-spacing: 2px; margin-bottom: var(--spacing-lg);">
                    System Overview
                </h2>
                
                <div class="grid-3" id="metrics-container">
                    <!-- Metrics will be populated here -->
                </div>
            </section>

            <section class="card-group" style="margin-top: var(--spacing-2xl);">
                <h2 style="font-family: var(--font-tech); font-size: 1.2rem; color: var(--neon-cyan); text-transform: uppercase; letter-spacing: 2px; margin-bottom: var(--spacing-lg);">
                    Active Services
                </h2>
                
                <div class="grid-2" id="services-container">
                    <!-- Services will be populated here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Theme Manager -->
    <script src="/js/theme-manager.js"></script>
    
    <!-- Application Script -->
    <script>
        // Initialize theme
        if (typeof themeManager !== 'undefined') {
            console.log('Theme Manager initialized:', themeManager.currentTheme);
        }

        // Populate metrics
        const metricsContainer = document.getElementById('metrics-container');
        const metrics = [
            { label: 'Total Services', value: '33', status: 'active' },
            { label: 'System Health', value: '99.8%', status: 'active' },
            { label: 'API Response Time', value: '45ms', status: 'active' },
            { label: 'Data Storage', value: '2.3TB', status: 'active' },
            { label: 'Active Users', value: '1,247', status: 'active' },
            { label: 'Database Connections', value: '342', status: 'active' }
        ];

        if (metricsContainer) {
            metricsContainer.innerHTML = metrics.map(m => `
                <div class="crystal-panel">
                    <div class="hud-label">${m.label}</div>
                    <div class="metric-hud">
                        <div class="metric-value">${m.value}</div>
                        <div class="status-badge status-${m.status}">
                            ● ${m.status.toUpperCase()}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Populate services
        const servicesContainer = document.getElementById('services-container');
        const services = [
            { name: 'DigitalBrain', status: 'active', desc: 'Core AI Engine' },
            { name: 'ApiGateway', status: 'active', desc: 'Request Routing' },
            { name: 'Identity', status: 'active', desc: 'Authentication' },
            { name: 'CRM', status: 'active', desc: 'Customer Relations' },
            { name: 'Analytics', status: 'active', desc: 'Data Analytics' },
            { name: 'Workflow', status: 'active', desc: 'Process Automation' }
        ];

        if (servicesContainer) {
            servicesContainer.innerHTML = services.map(s => `
                <div class="service-card">
                    <div class="service-card-header">
                        <div class="service-card-title">${s.name}</div>
                        <span class="status-badge status-${s.status}">● ${s.status}</span>
                    </div>
                    <div class="service-card-description">${s.desc}</div>
                    <div class="service-card-footer">
                        <span style="font-size: 0.75rem; color: var(--text-muted);">Running ✓</span>
                        <button class="crystal-btn">View Details</button>
                    </div>
                </div>
            `).join('');
        }

        // Update telemetry
        setInterval(() => {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('uptime').textContent = `${hours}:${minutes}:${seconds}`;
            document.getElementById('cpu').textContent = (Math.random() * 45 + 5).toFixed(1) + '%';
            document.getElementById('memory').textContent = (Math.random() * 60 + 20).toFixed(1) + '%';
        }, 1000);
    </script>
</body>
</html>
