<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#00f2ff">
    <title>AI Enterprise OS</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Orbitron:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Theme CSS -->
    <link rel="stylesheet" href="css/theme.css">
    
    <style>
        /* ─────────────────────────────────────────────────────────────────
           APPLICATION-SPECIFIC STYLES (Beyond theme variables)
           ───────────────────────────────────────────────────────────────── */

        /* Opportunity/Pipeline Cards */
        .opportunity-card {
            background: var(--bg-crystal);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border-crystal);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            transition: all var(--transition-normal);
            cursor: pointer;
        }

        .opportunity-card:hover {
            transform: translateY(-4px);
            border-color: var(--border-neon);
            box-shadow: var(--shadow-neon);
            background: rgba(0, 242, 255, 0.05);
        }

        /* Pipeline Column */
        .pipeline-column {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }

        .pipeline-title {
            font-family: var(--font-tech);
            font-size: 0.75rem;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            padding-bottom: var(--spacing-md);
            border-bottom: 1px solid var(--border-crystal);
            margin-bottom: var(--spacing-md);
        }

        /* Module Grid Layout */
        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: var(--spacing-lg);
        }

        .module-card {
            background: var(--bg-crystal);
            border: 1px solid var(--border-crystal);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            transition: all var(--transition-normal);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .module-card:hover {
            transform: translateY(-8px);
            border-color: var(--border-neon);
            box-shadow: var(--shadow-neon);
        }

        .module-card-title {
            font-family: var(--font-tech);
            font-size: 1.1rem;
            color: var(--neon-cyan);
            margin-bottom: var(--spacing-md);
            letter-spacing: 1px;
        }

        .module-card-value {
            font-family: var(--font-tech);
            font-size: 1.8rem;
            color: var(--neon-green);
            margin: var(--spacing-lg) 0;
        }

        /* Progress Bar */
        .progress-bar {
            height: 6px;
            background: rgba(0, 242, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: var(--spacing-md) 0;
        }

        .progress-fill {
            height: 100%;
            background: var(--neon-cyan);
            box-shadow: var(--shadow-neon);
            transition: width 0.5s ease;
        }

        /* Language Buttons */
        .lang-btn {
            font-family: var(--font-tech);
            font-size: 0.7rem;
            color: var(--text-secondary);
            padding: var(--spacing-sm) var(--spacing-md);
            border: 1px solid var(--border-crystal);
            border-radius: var(--radius-sm);
            transition: all var(--transition-fast);
            cursor: pointer;
            letter-spacing: 1px;
        }

        .lang-btn:hover,
        .lang-btn.active {
            color: var(--neon-cyan);
            border-color: var(--neon-cyan);
        }

        /* Notification Badge */
        .notif-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--neon-pink);
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .notification-icon {
            position: relative;
            cursor: pointer;
            font-size: 1.2rem;
            transition: filter 0.3s;
        }

        .notification-icon:hover {
            filter: drop-shadow(0 0 10px var(--neon-cyan));
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border: 2px solid var(--border-neon);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-fast);
            font-size: 1.2rem;
        }

        .user-avatar:hover {
            box-shadow: var(--shadow-neon);
        }

        /* Glow Effect */
        .glow-effect {
            animation: glow-pulse 3s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% {
                filter: drop-shadow(0 0 5px rgba(0, 242, 255, 0.5));
            }
            50% {
                filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.8));
            }
        }

        /* Terminal Style */
        .log-terminal {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--border-crystal);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--neon-green);
            height: 300px;
            overflow-y: auto;
            line-height: 1.6;
        }

        .log-terminal::-webkit-scrollbar {
            width: 4px;
        }

        .log-terminal::-webkit-scrollbar-thumb {
            background: var(--neon-cyan);
            border-radius: 4px;
        }

        /* File Upload */
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        /* Range Slider */
        input[type="range"] {
            width: 100%;
            height: 4px;
            border-radius: 5px;
            background: var(--bg-glass-heavy);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--neon-cyan);
            cursor: pointer;
            box-shadow: var(--shadow-neon);
            transition: all var(--transition-fast);
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            width: 20px;
            height: 20px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.8);
        }

        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--neon-cyan);
            cursor: pointer;
            box-shadow: var(--shadow-neon);
            border: none;
            transition: all var(--transition-fast);
        }

        input[type="range"]::-moz-range-thumb:hover {
            width: 20px;
            height: 20px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.8);
        }

        /* SVG Icons */
        svg {
            fill: currentColor;
        }

        .sidebar-icon svg {
            width: 24px;
            height: 24px;
            filter: drop-shadow(0 0 5px rgba(0, 242, 255, 0.3));
        }

        /* Responsive Grid */
        @media (max-width: 1024px) {
            .module-grid {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .module-grid {
                grid-template-columns: 1fr;
            }

            .topbar-right {
                display: flex;
                gap: var(--spacing-md);
            }
        }
    </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════════════════
     APPLICATION SHELL
     ═══════════════════════════════════════════════════════════════════════════════ -->

<div class="app-shell">
    
    <!-- SIDEBAR ─────────────────────────────────────────────────────────────────── -->
    <aside class="sidebar" id="sidebar">
        <!-- Dynamically populated by JavaScript -->
    </aside>

    <!-- TOPBAR ──────────────────────────────────────────────────────────────────── -->
    <header class="topbar" id="topbar">
        <!-- System Telemetry -->
        <div class="topbar-telemetry">
            <div class="telemetry-item"><span>CPU:</span> <span id="cpu-metric">--% </span></div>
            <div class="telemetry-item"><span>MEM:</span> <span id="mem-metric">--% </span></div>
            <div class="telemetry-item"><span>NET:</span> <span id="net-metric">--Mbps</span></div>
            <div class="telemetry-item"><span>SERVICES:</span> <span id="services-metric">33</span></div>
        </div>

        <!-- Title -->
        <div class="topbar-title">AI ENTERPRISE OS</div>

        <!-- Right Controls -->
        <div class="topbar-right" style="display: flex; gap: var(--spacing-xl); align-items: center;">
            <!-- Language Selector -->
            <div style="display: flex; gap: var(--spacing-sm); font-family: var(--font-tech);">
                <span class="lang-btn active" data-lang="it" onclick="changeLanguage('it')">IT</span>
                <span class="lang-btn" data-lang="en" onclick="changeLanguage('en')">EN</span>
                <span class="lang-btn" data-lang="ru" onclick="changeLanguage('ru')">RU</span>
                <span class="lang-btn" data-lang="zh" onclick="changeLanguage('zh')">中文</span>
            </div>

            <!-- Theme Toggle -->
            <button id="theme-toggle" class="crystal-btn" onclick="toggleTheme()" style="font-size: 1.2rem; padding: var(--spacing-sm) var(--spacing-md);">
                🌙
            </button>

            <!-- Notifications -->
            <div class="notification-icon" onclick="toggleNotifications()">
                🔔
                <span class="notif-badge" id="notif-count">3</span>
            </div>

            <!-- User Avatar -->
            <div class="user-avatar" onclick="showProfile()">👤</div>
        </div>
    </header>

    <!-- MAIN CONTENT ────────────────────────────────────────────────────────────── -->
    <main class="content" id="content">
        <div class="crystal-panel">
            <div class="hud-label">SYSTEM_INITIALIZING</div>
            <h1 style="font-family: var(--font-tech); letter-spacing: 5px; color: var(--neon-cyan);">
                WELCOME TO AI ENTERPRISE OS
            </h1>
            <p style="color: var(--text-secondary); margin-top: var(--spacing-lg);">
                Access authorized. Knowledge Graph synchronized. Select a module to begin.
            </p>
        </div>
    </main>

    <!-- NOTIFICATION PANEL ──────────────────────────────────────────────────────── -->
    <div id="notif-panel" class="notif-panel hidden" style="display: none;">
        <!-- Populated by JavaScript -->
    </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════════════
     COGNITIVE SHELL - HOLOGRAPHIC INTERFACE
     ═══════════════════════════════════════════════════════════════════════════════ -->

<div class="cognitive-shell">
    <div class="holographic-container">
        <!-- AI Query Icon -->
        <svg class="input-icon" viewBox="0 0 24 24">
            <path d="M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22A10,10 0 0,1 2,12A10,10 0 0,1 12,2M12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20A8,8 0 0,0 20,12A8,8 0 0,0 12,4M12,6A6,6 0 0,1 18,12A6,6 0 0,1 12,18A6,6 0 0,1 6,12A6,6 0 0,1 12,6M12,8A4,4 0 0,0 8,12A4,4 0 0,0 12,16A4,4 0 0,0 16,12A4,4 0 0,0 12,8Z" />
        </svg>
        
        <!-- AI Query Input -->
        <input 
            id="cognitive-input" 
            type="text"
            placeholder="QUERY SYSTEM... TYPE YOUR COMMAND..."
            autocomplete="off"
            onkeypress="handleCognitiveInput(event)"
        />
    </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════════════
     SCRIPTS
     ═══════════════════════════════════════════════════════════════════════════════ -->

<!-- Theme Manager -->
<script src="js/theme-manager.js"></script>

<!-- i18n (if available) -->
<script src="js/i18n.js" onerror="console.warn('i18n not available')"></script>

<!-- Application Logic -->
<script>
    // ─────────────────────────────────────────────────────────────────────────────
    // MODULES CONFIGURATION
    // ─────────────────────────────────────────────────────────────────────────────

    const modules = [
        { id: 'Dashboard', route: 'dashboard', icon: '📊' },
        { id: 'CRM', route: 'crm', icon: '👥' },
        { id: 'ERP', route: 'erp', icon: '📦' },
        { id: 'HR', route: 'hr', icon: '👨‍💼' },
        { id: 'Analytics', route: 'analytics', icon: '📈' },
        { id: 'BI', route: 'bi', icon: '🔍' },
        { id: 'Workflow', route: 'workflow', icon: '⚙️' },
        { id: 'Identity', route: 'identity', icon: '🔐' },
        { id: 'Monitoring', route: 'monitoring', icon: '📡' },
        { id: 'Governance', route: 'governance', icon: '⚖️' }
    ];

    // ─────────────────────────────────────────────────────────────────────────────
    // RENDER SIDEBAR
    // ─────────────────────────────────────────────────────────────────────────────

    function renderSidebar() {
        const sidebar = document.getElementById('sidebar');
        sidebar.innerHTML = `
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    ◆ BOS
                </div>
            </div>
        `;

        modules.forEach(module => {
            const item = document.createElement('div');
            item.className = `sidebar-item ${getCurrentModule() === module.route ? 'active' : ''}`;
            item.innerHTML = `
                <span class="sidebar-icon">${module.icon}</span>
                <span class="sidebar-label">${module.id}</span>
            `;
            item.onclick = () => loadModule(module.route);
            sidebar.appendChild(item);
        });
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // MODULE LOADING
    // ─────────────────────────────────────────────────────────────────────────────

    let currentModule = 'dashboard';

    function getCurrentModule() {
        return currentModule;
    }

    function loadModule(route) {
        currentModule = route;
        const content = document.getElementById('content');
        content.innerHTML = `
            <div class="glow-effect" style="padding: var(--spacing-2xl); text-align: center;">
                <div style="font-family: var(--font-tech); color: var(--neon-cyan); letter-spacing: 3px;">
                    LOADING_${route.toUpperCase()}...
                </div>
            </div>
        `;

        setTimeout(() => {
            switch (route) {
                case 'dashboard': renderDashboard(); break;
                case 'crm': renderCRM(); break;
                case 'erp': renderERP(); break;
                case 'hr': renderHR(); break;
                case 'analytics': renderAnalytics(); break;
                case 'bi': renderBI(); break;
                case 'workflow': renderWorkflow(); break;
                case 'identity': renderIdentity(); break;
                case 'monitoring': renderMonitoring(); break;
                case 'governance': renderGovernance(); break;
                default: renderDashboard();
            }
            renderSidebar();
        }, 300);
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // MODULE VIEWS
    // ─────────────────────────────────────────────────────────────────────────────

    function renderDashboard() {
        document.getElementById('content').innerHTML = `
            <div class="crystal-panel">
                <div class="hud-label">DASHBOARD_OVERVIEW</div>

                    System Status
                </h2>
                
                <div class="module-grid">
                    <div class="module-card">
                        <div class="module-card-title">Total Services</div>
                        <div class="module-card-value">33</div>

                    </div>
                    
                    <div class="module-card">

                    <div class="module-card">

                    <div class="module-card">
                        <div class="module-card-title">API Response</div>
                        <div class="module-card-value">45ms</div>
                        <div class="hud-badge" style="margin-top: auto; color: var(--neon-green);">✓ FAST</div>
                    </div>
                </div>
            </div>

    }

    function renderCRM() {

                <div class="hud-label">CUSTOMER_RELATIONSHIP</div>

                </h2>
                
                <div class="module-grid">
                    <div class="opportunity-card">

                        <button class="crystal-btn" style="width: 100%;">Move to Proposal</button>
                    </div>
                    
                    <div class="opportunity-card">
                        <div style="font-weight: bold; color: var(--neon-cyan);">Proposals</div>
                        <div style="font-size: 2rem; color: var(--neon-orange); margin: var(--spacing-lg) 0;">5</div>
                        <button class="crystal-btn" style="width: 100%;">Track Status</button>
                    </div>
                    
                    <div class="opportunity-card">

                        <button class="crystal-btn" style="width: 100%;">Generate Report</button>

    function renderERP() {

                <h2 style="font-family: var(--font-tech); color: var(--neon-cyan); margin-bottom: var(--spacing-xl);">
                    Order Management
                </h2>
                
                <div style="display: grid; grid-template-columns: 1fr 2fr; gap: var(--spacing-xl);">

                                <br><small>Status: In Production</small>

                            <div class="opportunity-card">

                <div class="module-grid">

                            <div class="progress-fill" style="width: 97%;"></div>
                        </div>
                    </div>
                    
                    <div class="module-card">
                        <div class="module-card-title">On Leave</div>
                        <div class="module-card-value">4</div>
                        <div class="hud-badge" style="background: rgba(255, 136, 0, 0.1); color: var(--neon-orange); border-color: var(--neon-orange);">

                    </div>

    }

    function renderAnalytics() {
        document.getElementById('content').innerHTML = `

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-xl);">

    }

    function renderBI() {
        document.getElementById('content').innerHTML = `
            <div class="crystal-panel">
                <div class="hud-label">BUSINESS_INTELLIGENCE</div>
                <h2 style="font-family: var(--font-tech); color: var(--neon-green); margin-bottom: var(--spacing-xl);">
                    Revenue Report
                </h2>
                
                <div class="metric-hud" style="width: 100%;">
                    <div class="metric-value">€1.4M</div>
                    <div class="metric-desc">YTD Revenue</div>
                </div>
            </div>
        `;
    }

    function renderWorkflow() {
        document.getElementById('content').innerHTML = `
            <div class="crystal-panel">
                <div class="hud-label">PROCESS_AUTOMATION</div>
                <h2 style="font-family: var(--font-tech); color: var(--neon-purple); margin-bottom: var(--spacing-xl);">
                    Workflow Processes
                </h2>
                
                <div class="module-grid">
                    <div class="module-card">
                        <div class="module-card-title">Pending Tasks</div>

    // ─────────────────────────────────────────────────────────────────────────────
    // EVENT HANDLERS
    // ─────────────────────────────────────────────────────────────────────────────

    function toggleTheme() {
        if (typeof themeManager !== 'undefined') {
            const newTheme = themeManager.toggleTheme();
            const toggle = document.getElementById('theme-toggle');
            toggle.textContent = newTheme === 'dark' ? '☀️' : '🌙';
        }
    }

    function changeLanguage(lang) {
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        document.querySelector(`[data-lang="${lang}"]`).classList.add('active');
    }

    function toggleNotifications() {
        const panel = document.getElementById('notif-panel');
        panel.classList.toggle('hidden');
        panel.style.display = panel.classList.contains('hidden') ? 'none' : 'block';
    }

    function showProfile() {
        alert('Profile: admin@enterprise-os.local');
    }

    function handleCognitiveInput(event) {
        if (event.key === 'Enter') {
            const query = document.getElementById('cognitive-input').value;
            console.log('Query:', query);
            alert('Command: ' + query);
            document.getElementById('cognitive-input').value = '';
        }
    }

    function updateTelemetry() {
        document.getElementById('cpu-metric').textContent = 
            (Math.random() * 40 + 5).toFixed(1) + '%';
        document.getElementById('mem-metric').textContent = 
            (Math.random() * 50 + 20).toFixed(1) + '%';
        document.getElementById('net-metric').textContent = 
            (Math.random() * 1000 + 500).toFixed(0) + 'Mbps';
    }
