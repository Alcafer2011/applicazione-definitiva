

services:

  backuprestore:
    build:
      context: ./BackupRestore.Service
    container_name: bos-backuprestore
    volumes:
      - mongo_data:/data/db
    networks:
      - bos-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backuprestore.rule=Host(`localhost`) && PathPrefix(`/backup`)"
      - "traefik.http.routers.backuprestore.entrypoints=websecure"
      - "traefik.http.services.backuprestore.loadbalancer.server.port=8080"

  adminconsole:
    build:
      context: ./AdminConsole.Service
    container_name: bos-adminconsole
    networks:
      - bos-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adminconsole.rule=Host(`localhost`) && PathPrefix(`/admin`)"
      - "traefik.http.routers.adminconsole.entrypoints=websecure"
      - "traefik.http.services.adminconsole.loadbalancer.server.port=8080"

  analyticshub:
    build:
      context: ./AnalyticsHub.Service
    container_name: bos-analyticshub
