      - bos-net
  hr:
    build:
      context: ./services/HR.Service
    container_name: bos-hr
    networks:
      - bos-net
  integrationhub:
    build:
      context: ./services/IntegrationHub.Service
    container_name: bos-integrationhub
    networks:
      - bos-net
  loadplanner3d:
    build:
      context: ./services/LoadPlanner3D.Service
    container_name: bos-loadplanner3d
    networks:
      - bos-net
  manufacturing:
    build:
      context: ./services/Manufacturing.Service
    container_name: bos-manufacturing
    networks:
      - bos-net
  onboarding:
    build:
      context: ./services/Onboarding.Service
    container_name: bos-onboarding
    networks:
      - bos-net
  project:
    build:
      context: ./services/Project.Service
    container_name: bos-project
    networks:
      - bos-net
  scenariosimulator:
    build:
      context: ./services/ScenarioSimulator.Service
    container_name: bos-scenariosimulator
    networks:
      - bos-net
  serviceregistry:
    build:
      context: ./services/ServiceRegistry.Service
    container_name: bos-serviceregistry
    networks:
      - bos-net
  tenant:
    build:
      context: ./services/Tenant.Service
    container_name: bos-tenant
    networks:
      - bos-net
  verticalpack:
    build:
      context: ./services/VerticalPack.Service
    container_name: bos-verticalpack
    networks:
      - bos-net
  warehouse:
    build:
      context: ./services/Warehouse.Service
    container_name: bos-warehouse
    networks:
      - bos-net
  search:
    build:
      context: ./services/Search.Service
    container_name: bos-search
    networks:
      - bos-net

  mongo:
    image: mongo:7
    container_name: bos-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - bos-net

  ui-react:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    container_name: bos-ui-react
    restart: unless-stopped
    networks:
      - bos-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ui-react.rule=Host(`localhost`)"
      - "traefik.http.routers.ui-react.entrypoints=web"
      - "traefik.http.services.ui-react.loadbalancer.server.port=80"

  ui-legacy:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bos-ui-legacy
    restart: unless-stopped
    networks:
      - bos-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ui-legacy.rule=Host(`localhost`) && PathPrefix(`/legacy`)"
      - "traefik.http.routers.ui-legacy.entrypoints=web"
      - "traefik.http.services.ui-legacy.loadbalancer.server.port=80"

  ui-loadplanner3d:
    build:
      context: ./frontend-loadplanner3d
      dockerfile: Dockerfile
    container_name: bos-ui-loadplanner3d
    restart: unless-stopped
    networks:
      - bos-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ui-loadplanner3d.rule=Host(`localhost`) && PathPrefix(`/loadplanner`)"
      - "traefik.http.routers.ui-loadplanner3d.entrypoints=web"
      - "traefik.http.services.ui-loadplanner3d.loadbalancer.server.port=80"

  traefik:
    image: traefik:v2.10
    container_name: bos-traefik
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "8080:80"
      - "443:443"
      - "8081:8080"
    volumes:
      - ./traefik.yml:/traefik.yml
      - ./certs:/certs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - bos-net

  loki:
    image: grafana/loki:2.9.0
    container_name: bos-loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/loki-config.yml
      - loki_data:/loki
    networks:
      - bos-net

  promtail:
    image: grafana/promtail:2.9.0
    container_name: bos-promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/promtail-config.yml
    networks:
      - bos-net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: bos-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    networks:
      - bos-net

networks:
  bos-net:
    driver: bridge

volumes:
  mongo_data:
  loki_data:
  grafana_data:
