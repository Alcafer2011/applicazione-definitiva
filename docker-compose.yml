      - "traefik.http.routers.audit.rule=Host(`localhost`) && PathPrefix(`/audit`)"
      - "traefik.http.routers.audit.entrypoints=websecure"
      - "traefik.http.services.audit.loadbalancer.server.port=8080"

  notificationcenter:
    build:
      context: ./NotificationCenter.Service
    container_name: bos-notificationcenter
