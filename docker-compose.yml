      - "traefik.http.services.messagebus.loadbalancer.server.port=8080"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: bos-rabbitmq
    ports:
      - "15672:15672"
    networks:
      - bos-net

  scheduler:
